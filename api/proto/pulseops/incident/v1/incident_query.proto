syntax = "proto3";

package pulseops.incident.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tbikbulatov/go-pulseops/gen/incident/v1;incidentv1";

service IncidentQueryService {
  rpc GetIncident(GetIncidentRequest) returns (GetIncidentResponse);
  rpc ListIncidents(ListIncidentsRequest) returns (ListIncidentsResponse);
}

message GetIncidentRequest {
  string id = 1;
}

message GetIncidentResponse {
  Incident incident = 1;
}

message ListIncidentsRequest {
  string status = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListIncidentsResponse {
  repeated Incident incidents = 1;
}

message Incident {
  string id = 1;
  string service = 2;
  string environment = 3;
  string severity = 4;
  string status = 5;
  string dedup_key = 6;
  int32 alert_count = 7;
  google.protobuf.Timestamp first_seen_at = 8;
  google.protobuf.Timestamp last_seen_at = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}
